<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Main Page</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #000;
    color: #fff;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background-color: #141414;
    flex-wrap: wrap;
  }

  #logo {
    height: 70px;
  }

  .search {
    display: flex;
    align-items: center;
    background-color: #222;
    padding: 5px 10px;
    border-radius: 5px;
    flex: 1;
    max-width: 400px;
    margin: 10px;
  }

  .search-icon {
    color: #fff;
    margin-right: 5px;
  }

  .search-bar {
    border: none;
    outline: none;
    background: transparent;
    color: white;
    flex: 1;
  }

  nav ul {
    list-style: none;
    display: flex;
    gap: 10px;
    padding: 0;
    margin: 0;
  }

  nav ul li a {
    background-color: #e50914;
    color: white;
    padding: 8px 14px;
    border-radius: 4px;
    text-decoration: none;
    font-weight: bold;
    transition: background 0.3s;
    cursor: pointer;
  }

  nav ul li a:hover {
    background-color: #f40612;
  }

  /* Slideshow */
  .slideshow-container {
    position: relative;
    max-width: 100%;
    margin: auto;
    overflow: hidden;
  }

  .mySlides {
    display: none;
  }

  .slideshow-img {
    width: 100%;
    height: 450px;
    object-fit: cover;
  }

  .prev, .next {
    cursor: pointer;
    position: absolute;
    top: 50%;
    padding: 16px;
    color: white;
    font-weight: bold;
    font-size: 20px;
    transition: 0.3s;
    border-radius: 3px;
    user-select: none;
    background-color: rgba(0,0,0,0.4);
  }

  .next { right: 0; }
  .prev:hover, .next:hover {
    background-color: rgba(0,0,0,0.8);
  }

  /* Dots */
  .dots {
    text-align: center;
    margin: 10px 0;
  }
  .dot {
    cursor: pointer;
    height: 12px;
    width: 12px;
    margin: 0 3px;
    background-color: #bbb;
    border-radius: 50%;
    display: inline-block;
    transition: background-color 0.4s ease;
  }
  .active, .dot:hover {
    background-color: #e50914;
  }

  /* Red-black strip */
  .slideshow-separator {
    background: linear-gradient(to right, #e50914, #000);
    height: 8px;
    width: 100%;
  }

  .now-showing-wrapper {
  max-width: 1200px;
  margin: 0 auto;
  padding: 50 20px;
  text-align: center;  /* centers inline elements inside */
}


.now_showing_heading {
  font-size: 30px;
  display: inline-block;
  margin: 20px auto 10px auto;  /* top, horizontal auto centers it */
  text-align: center;
}



  /* Posters grid */
  .gallery-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
  max-width: 1200px; /* optional: limit the width of the entire gallery */
  margin: auto;      /* center align on wide screens */
}

  .movie-card {
  display: flex;
  flex-direction: column;
  background-color: #141414;
  border-radius: 6px;
  overflow: hidden; /* ensures image corners respect border radius */
  text-align: center;
  color: white;
  text-decoration: none;
  transition: transform 0.3s;
}
  .movie-card img {
  width: 100%;         /* fills container width */
  height: 100%;        /* fills container height */
  aspect-ratio: 2/3;   /* maintains poster-like shape */
  object-fit: cover;   /* scales and crops to fill */
  border-radius: 6px 6px 0 0;
  display: block;      /* removes inline spacing gaps */
}

  .movie-title {
    font-weight: bold;
    padding: 5px;
  }
  .movie-lang {
    color: #aaa;
    padding-bottom: 5px;
  }
  .movie-card:hover {
    transform: scale(1.05);
  }

  /* Responsive */
  @media (max-width: 900px) {
    .gallery-container {
      grid-template-columns: repeat(2, 1fr);
    }
  }
  @media (max-width: 500px) {
    .gallery-container {
      grid-template-columns: repeat(1, 1fr);
    }
  }

  /* Modal Styles */
  .modal {
    display: none;
    position: fixed;
    z-index: 999;
    padding-top: 60px;
    left: 0; top: 0;
    width: 100%; height: 100%;
    overflow: auto;
    background-color: rgba(0,0,0,0.85);
  }
  .modal-content {
    background-color: #1a1a1a;
    margin: auto;
    padding: 20px;
    border: 2px solid #e50914;
    width: 300px;
    text-align: center;
    color: white;
    border-radius: 8px;
  }
  .modal-content img {
    width: 80%;
    margin: 10px 0;
    cursor: pointer;
    border-radius: 5px;
    transition: transform 0.2s;
  }
  .modal-content img:hover {
    transform: scale(1.05);
  }
  .location-icons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 15px;
  }

  .location-icons img {
    width: 50px; /* smaller size */
    height: 50px;
    filter: brightness(0) invert(1); /* makes icons white */
    cursor: pointer;
    transition: transform 0.2s;
  }

  .location-icons img:hover {
    transform: scale(1.1);
  }

  #signinModal .modal-content {
    background:#141414;
    color:white;
    max-width:400px;
    padding:30px 25px 40px 25px;
    border-radius:8px;
    position:relative;
    top:20%;
    box-shadow: 0 0 20px rgba(229,9,20,0.7);
  }

  #signinModal .signin-form input {
    background:#333;
    border:none;
    border-radius:4px;
    padding:12px 15px;
    color:white;
    font-size:16px;
    margin-bottom:15px;
  }
  #signinModal .signin-form input::placeholder {
    color:#888;
  }
  #signinModal .signin-form button {
    background:#e50914;
    border:none;
    border-radius:4px;
    padding:12px;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
    transition: background-color 0.3s ease;
  }
  #signinModal .signin-form button:hover {
    background:#f40612;
  }
  #signinModal .modal-content .close {
    color:#bbb;
  }
  #signinModal .modal-content .close:hover {
    color:#e50914;
  }
  #signinModal a:hover {
    text-decoration: underline;
  }

  .close {
    color: #e50914;
    float: right;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <img id="logo" alt="rollingpopcornlogo" src="assets/rollingpopcornlogo.png">
  <div class="search">
    <span class="search-icon material-symbols-outlined">search</span>
    <input type="search" class="search-bar" placeholder="Search for Movies here...">
  </div>
  <nav>
    <ul>
      <li><a id="openModalBtn">Location</a></li>
      <li><a href="#" id="signinBtn">Sign In</a></li>

    </ul>
  </nav>
</header>

<div class="slideshow-container">
  <div class="mySlides fade">
    <img src="assets/banner2.png" class="slideshow-img">
  </div>
  <div class="mySlides fade">
    <img src="assets/banner1.png" class="slideshow-img">
  </div>
  <div class="mySlides fade">
    <img src="assets/banner3.png" class="slideshow-img">
  </div>
  <a class="prev" onclick="plusSlides(-1)">❮</a>
  <a class="next" onclick="plusSlides(1)">❯</a>
</div>

<div class="dots">
  <span class="dot" onclick="currentSlide(1)"></span>
  <span class="dot" onclick="currentSlide(2)"></span>
  <span class="dot" onclick="currentSlide(3)"></span>
</div>

<div class="slideshow-separator"></div>

<div class="now-showing-wrapper">
<h2 class="now_showing_heading">Now Showing</h2>
<div class="gallery-container">

</div></div>


<!-- Modal -->
<div id="locationModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h3>Select Your City</h3>
    <div class="location-icons">
      <img src="assets/mumbai.png" alt="Mumbai">
      <img src="assets/delhi.png" alt="Delhi">
      <img src="assets/bengaluru.png" alt="Bengaluru">
    </div>
  </div>
</div>

<div id="signinModal" class="modal">
  <div class="modal-content">
    <span class="close" data-modal="signinModal">&times;</span>
    <h2 style="color:#e50914; text-align:center; margin-bottom:20px;">Sign In</h2>
    <form class="signin-form" id="signinForm">
      <input type="email" id="email" placeholder="Email" required autocomplete="username" />
      <input type="password" id="password" placeholder="Password" required autocomplete="current-password" />
      <button type="submit">Sign In</button>
      <div style="margin-top:10px; display:flex; justify-content: space-between; font-size: 14px;">
        <a href="#" id="forgotPassword" style="color:#b3b3b3; text-decoration:none;">Forgot password?</a>
        <a href="#" id="signupLink" style="color:#b3b3b3; text-decoration:none;">Sign Up</a>
      </div>
      <p id="signinMessage" style="color:#e50914; margin-top:15px; display:none;"></p>
    </form>
  </div>
</div>



<script>
let slideIndex = 0;
showSlides();

function showSlides() {
  let i;
  let slides = document.getElementsByClassName("mySlides");
  let dots = document.getElementsByClassName("dot");
  for (i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";
  }
  slideIndex++;
  if (slideIndex > slides.length) {slideIndex = 1}
  for (i = 0; i < dots.length; i++) {
    dots[i].className = dots[i].className.replace(" active", "");
  }
  slides[slideIndex-1].style.display = "block";
  dots[slideIndex-1].className += " active";
  setTimeout(showSlides, 4000);
}

function plusSlides(n) {
  slideIndex += n-1;
  showSlides();
}

function currentSlide(n) {
  slideIndex = n-1;
  showSlides();
}

// Modal functionality
const modal = document.getElementById("locationModal");
const btn = document.getElementById("openModalBtn");
const span = document.querySelector(".close");

btn.onclick = function() {
  modal.style.display = "block";
}

span.onclick = function() {
  modal.style.display = "none";
}

window.onclick = function(event) {
  if (event.target == modal) {
    modal.style.display = "none";
  }
}
  // Close modal when icon clicked
  document.querySelectorAll('.signin-icons img').forEach(icon => {
    icon.addEventListener('click', () => {
      document.getElementById('signinModal').style.display = 'none';
    });
  });

  // Open Sign In Modal (already done in your existing code)
  document.getElementById('signinBtn').addEventListener('click', () => {
    document.getElementById('signinModal').style.display = 'block';
    document.getElementById('signinMessage').style.display = 'none'; // Reset error message on open
  });

  // Handle Sign In Form Submit
  document.getElementById('signinForm').addEventListener('submit', (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const messageEl = document.getElementById('signinMessage');

    // Simple mock authentication: accept only a test account for demo
    if(email === 'user@example.com' && password === 'password123') {
      messageEl.style.color = 'lightgreen';
      messageEl.textContent = 'Successfully signed in!';
      messageEl.style.display = 'block';

      // Close modal after short delay
      setTimeout(() => {
        document.getElementById('signinModal').style.display = 'none';
        messageEl.style.display = 'none';
        e.target.reset();
      }, 1500);
    } else {
      messageEl.style.color = '#e50914';
      messageEl.textContent = 'Invalid email or password.';
      messageEl.style.display = 'block';
    }
  });

  // Forgot password click handler (demo)
  document.getElementById('forgotPassword').addEventListener('click', (e) => {
    e.preventDefault();
    alert('Password reset instructions will be sent to your email.');
  });

  // Signup link click handler (demo)
  document.getElementById('signupLink').addEventListener('click', (e) => {
    e.preventDefault();
    alert('Redirecting to Sign Up page...');
  });

  document.getElementById('signinBtn').addEventListener('click', (e) => {
  e.preventDefault();  // prevent default link behavior
  document.getElementById('signinModal').style.display = 'block';
  document.getElementById('signinMessage').style.display = 'none'; // Reset error message on open
});

// Close buttons for all modals
document.querySelectorAll('.modal .close').forEach(closeBtn => {
  closeBtn.addEventListener('click', () => {
    closeBtn.closest('.modal').style.display = 'none';
  });
});

  
</script>

</body>
</html>
