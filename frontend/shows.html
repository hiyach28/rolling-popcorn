<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rolling Popcorn - Showtimes</title>
<style>
  /* Reset */
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    padding: 20px;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
  }
  header {
    background: #141414;
    padding: 20px 25px;
    font-size: 1.8rem;
    font-weight: 700;
    color: #e50914;
    border-bottom: 3px solid #e50914;
  }
  .movie-info {
    padding: 20px 25px;
    border-bottom: 2px solid #222;
  }
  .movie-title {
    font-size: 1.8rem;
    font-weight: 700;
  }
  .movie-language {
    margin-top: 6px;
    color: #999;
    font-size: 1rem;
  }
  .date-selector {
    display: flex;
    gap: 15px;
    overflow-x: auto;
    padding: 15px 25px;
    border-bottom: 2px solid #222;
    background: #111;
  }
  .date-selector button {
    background: #222;
    border: none;
    color: #aaa;
    padding: 12px 18px;
    border-radius: 6px;
    cursor: pointer;
    flex-shrink: 0;
    min-width: 80px;
    font-weight: 600;
    font-size: 1rem;
    transition: background-color 0.3s, color 0.3s;
  }
  .date-selector button.active,
  .date-selector button:hover {
    background: #e50914;
    color: #fff;
  }
  .theaters-container {
    padding: 25px;
  }
  .theater {
    border-bottom: 1px solid #222;
    padding-bottom: 20px;
    margin-bottom: 25px;
  }
  .theater-header {
    display: flex;
    align-items: center;
    gap: 20px;
    font-weight: 600;
    font-size: 1.2rem;
    color: #fff;
    margin-bottom: 12px;
  }
  .theater-logo {
    width: 40px;
    height: 40px;
    object-fit: contain;
  }
  .showtimes {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
  }
  .showtime-btn {
    border: 2px solid #e50914;
    background: transparent;
    color: #e50914;
    padding: 10px 18px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: 600;
    font-size: 1rem;
    min-width: 100px;
    white-space: pre-line;
    transition: background-color 0.3s, color 0.3s;
    display: flex;
    align-items: center;
  }
  .showtime-btn.available {
    background: #0f600f;
    border-color: #0f600f;
    color: #b0fcb0;
  }
  .showtime-btn.fast-filling {
    background: #e5a500;
    border-color: #e5a500;
    color: #fff;
  }
  .showtime-btn.unavailable {
    background: #4a0000;
    border-color: #660000;
    color: #800000;
    cursor: not-allowed;
  }
  .subtitle-badge {
    background: #16a085;
    color: #000;
    font-weight: 700;
    font-size: 0.7rem;
    margin-left: 6px;
    padding: 0 5px;
    border-radius: 2px;
  }
  .availability-legend {
    padding: 15px 25px;
    font-size: 1rem;
    color: #bbb;
    display: flex;
    gap: 25px;
    align-items: center;
  }
  .legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }
  .legend-available {
    background: #0f600f;
  }
  .legend-fast {
    background: #e5a500;
  }
  .legend-subtitle {
    background: #16a085;
    color: #000;
    font-weight: 700;
    border-radius: 3px;
    padding: 0 6px;
    font-size: 0.8rem;
  }
  /* Scrollbar for date selector */
  .date-selector::-webkit-scrollbar {
    height: 8px;
  }
  .date-selector::-webkit-scrollbar-thumb {
    background-color: #e50914;
    border-radius: 10px;
  }
  .date-selector::-webkit-scrollbar-track {
    background: #111;
  }
</style>
</head>
<body>

<header>Rolling Popcorn</header>

<div class="movie-info">
  <div class="movie-title" id="movieTitle">Loading...</div>
  <div class="movie-language" id="movieLanguage">Loading language...</div>
</div>

<div class="date-selector" id="dateSelector"></div>

<div class="availability-legend">
  <span><span class="legend-dot legend-available"></span> AVAILABLE</span>
  <span><span class="legend-dot legend-fast"></span> FAST FILLING</span>
  <span><span class="legend-subtitle">LAN</span> SUBTITLES AVAILABLE</span>
</div>

<div class="theaters-container" id="theatersContainer">
  <!-- Dynamic theaters and showtimes here -->
</div>

<script>
  // Generate 7 days starting today with date and day name
  function getNext7Days() {
    const days = [];
    const dayNames = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
    const monthNames = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    const today = new Date();
    for(let i=0; i<7; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() + i);
      days.push({
        dateObj: d,
        dayName: dayNames[d.getDay()],
        dayNum: d.getDate(),
        monthName: monthNames[d.getMonth()]
      });
    }
    return days;
  }

  const dates = getNext7Days();

  const movieTitleEl = document.getElementById("movieTitle");
  const movieLangEl = document.getElementById("movieLanguage");
  const dateSelectorEl = document.getElementById("dateSelector");
  const theatersContainerEl = document.getElementById("theatersContainer");

  // Fetch movie info from backend
  async function fetchMovieData() {
    const res = await fetch('/api/movie');
    if (!res.ok) throw new Error('Failed to fetch movie data');
    return await res.json();
  }

  // Fetch theaters and showtimes for a given date (YYYY-MM-DD)
  async function fetchTheaters(dateStr) {
    const res = await fetch(`/api/theaters?date=${dateStr}`);
    if (!res.ok) throw new Error('Failed to fetch theaters data');
    return await res.json();
  }

  // Render date buttons
  function renderDates(selectedIndex = 0) {
    dateSelectorEl.innerHTML = "";
    dates.forEach((d, i) => {
      const btn = document.createElement("button");
      btn.textContent = `${d.dayName} ${d.dayNum} ${d.monthName}`;
      if(i === selectedIndex) btn.classList.add("active");
      btn.addEventListener("click", async () => {
        renderDates(i);
        await renderTheaters(i);
      });
      dateSelectorEl.appendChild(btn);
    });
  }

  // Render theaters and showtimes for selected date
  async function renderTheaters(dateIndex) {
    theatersContainerEl.innerHTML = "";
    const selectedDate = dates[dateIndex];
    const dateStr = selectedDate.dateObj.toISOString().split('T')[0]; // yyyy-mm-dd

    try {
      const theaters = await fetchTheaters(dateStr);

      theaters.forEach(t => {
        const theaterEl = document.createElement("div");
        theaterEl.classList.add("theater");

        const headerEl = document.createElement("div");
        headerEl.classList.add("theater-header");

        const logoImg = document.createElement("img");
        logoImg.classList.add("theater-logo");
        logoImg.src = t.logo;
        logoImg.alt = t.name;

        const nameSpan = document.createElement("span");
        nameSpan.textContent = t.name;

        headerEl.appendChild(logoImg);
        headerEl.appendChild(nameSpan);
        theaterEl.appendChild(headerEl);

        const showtimesEl = document.createElement("div");
        showtimesEl.classList.add("showtimes");

        t.showtimes.forEach(st => {
          const btn = document.createElement("button");
          btn.classList.add("showtime-btn");

          if(st.status === "available") btn.classList.add("available");
          else if(st.status === "fast-filling") btn.classList.add("fast-filling");
          else btn.classList.add("unavailable");

          btn.textContent = st.time + (st.type ? `\n${st.type}` : "");

          if(st.subtitles) {
            const span = document.createElement("span");
            span.classList.add("subtitle-badge");
            span.textContent = "LAN";
            btn.appendChild(span);
          }

          showtimesEl.appendChild(btn);
        });

        const cancelInfo = document.createElement("div");
        cancelInfo.style.color = "#888";
        cancelInfo.style.fontSize = "0.85rem";
        cancelInfo.style.marginTop = "8px";
        cancelInfo.textContent = t.cancellation;

        theaterEl.appendChild(showtimesEl);
        theaterEl.appendChild(cancelInfo);

        theatersContainerEl.appendChild(theaterEl);
      });
    } catch(err) {
      theatersContainerEl.textContent = 'Failed to load theaters/showtimes.';
      console.error(err);
    }
  }

  // Initialization function
  async function init() {
    try {
      const movieData = await fetchMovieData();
      movieTitleEl.textContent = `${movieData.title} (${movieData.language.split(" - ")[0]})`;
      movieLangEl.textContent = movieData.language;

      renderDates(0);
      await renderTheaters(0);
    } catch(err) {
      movieTitleEl.textContent = "Failed to load movie info.";
      movieLangEl.textContent = "";
      console.error(err);
    }
  }

  init();
</script>

</body>
</html>
