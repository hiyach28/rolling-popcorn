<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Rolling Popcorn</title>
    <link rel="stylesheet" href="/frontend/assets/css/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="navbar">
            <a href="/" class="logo">
                <img src="/frontend/assets/images/logos/rollingpopcornlogo.png" alt="Rolling Popcorn">
                <h1>Rolling Popcorn</h1>
            </a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/movies/">Movies</a>
                <a href="/booking/">My Bookings</a>
            </div>
            <div class="user-menu">
                <div class="user-info">
                    <div class="user-name">Guest</div>
                    <div class="user-role">Please Login</div>
                </div>
                <a href="/login/" class="btn btn-sm">Login</a>
                <a href="/register/" class="btn btn-sm">Register</a>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <div class="container">
        <!-- Booking Summary -->
        <section class="booking-summary">
            <h2 class="section-title">Booking Summary</h2>
            <div class="summary-details">
                <!-- Booking details will be loaded here dynamically -->
            </div>
        </section>

        <!-- Payment Section -->
        <section class="payment-section">
            <h2 class="section-title">Payment Method</h2>
            
            <form id="paymentForm" class="payment-form">
                <div class="payment-methods">
                    <div class="payment-method" onclick="selectPaymentMethod('card')">
                        <input type="radio" name="paymentMethod" value="card" id="cardPayment" checked>
                        <label for="cardPayment">
                            <h3>💳 Credit/Debit Card</h3>
                            <p>Pay securely with your card</p>
                        </label>
                    </div>
                    
                    <div class="payment-method" onclick="selectPaymentMethod('upi')">
                        <input type="radio" name="paymentMethod" value="upi" id="upiPayment">
                        <label for="upiPayment">
                            <h3>📱 UPI Payment</h3>
                            <p>Pay using UPI apps</p>
                        </label>
                    </div>
                    
                    <div class="payment-method" onclick="selectPaymentMethod('netbanking')">
                        <input type="radio" name="paymentMethod" value="netbanking" id="netbankingPayment">
                        <label for="netbankingPayment">
                            <h3>🏦 Net Banking</h3>
                            <p>Pay using your bank account</p>
                        </label>
                    </div>
                    
                    <div class="payment-method" onclick="selectPaymentMethod('wallet')">
                        <input type="radio" name="paymentMethod" value="wallet" id="walletPayment">
                        <label for="walletPayment">
                            <h3>💰 Digital Wallet</h3>
                            <p>Pay using digital wallets</p>
                        </label>
                    </div>
                </div>

                <!-- Payment Details Form -->
                <div id="paymentDetails" class="payment-details">
                    <!-- Payment form fields will be shown based on selected method -->
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-lg">Confirm Payment</button>
                    <a href="/seat/" class="btn btn-secondary">Back to Seat Selection</a>
                </div>
            </form>
        </section>
    </div>

    <!-- Footer -->
    <footer style="background-color: var(--dark-gray); padding: 2rem; text-align: center; margin-top: 3rem;">
        <div class="container">
            <p>&copy; 2024 Rolling Popcorn. All rights reserved.</p>
            <p>Experience the magic of cinema with us.</p>
        </div>
    </footer>

    <script src="/frontend/assets/js/app.js"></script>
    <script>
        let selectedPaymentMethod = 'card';
        let bookingData = null;

        // Initialize payment page
        document.addEventListener('DOMContentLoaded', async function() {
            await checkAuthStatus();
            
            // Load booking data from session storage
            const bookingDataStr = sessionStorage.getItem('bookingData');
            if (!bookingDataStr) {
                showMessage('No booking data found', 'error');
                window.location.href = '/';
                return;
            }
            
            try {
                bookingData = JSON.parse(bookingDataStr);
                displayBookingSummary(bookingData);
                showPaymentDetails('card');
            } catch (error) {
                showMessage('Invalid booking data', 'error');
                window.location.href = '/';
            }
        });

        // Display booking summary
        function displayBookingSummary(data) {
            const summaryDetails = document.querySelector('.summary-details');
            if (!summaryDetails) return;

            const totalAmount = data.seats.length * data.show.price_per_seat;
            
            summaryDetails.innerHTML = `
                <div class="summary-card">
                    <div class="summary-item">
                        <span>Movie:</span>
                        <span>${data.show.movie.title || data.show.movie.name}</span>
                    </div>
                    <div class="summary-item">
                        <span>Theater:</span>
                        <span>${data.show.screen.theater.name}</span>
                    </div>
                    <div class="summary-item">
                        <span>Screen:</span>
                        <span>${data.show.screen.screen_number}</span>
                    </div>
                    <div class="summary-item">
                        <span>Show Time:</span>
                        <span>${formatShowTime(data.show.show_time)}</span>
                    </div>
                    <div class="summary-item">
                        <span>Selected Seats:</span>
                        <span>${data.seats.map(seat => seat.seat_number).join(', ')}</span>
                    </div>
                    <div class="summary-item">
                        <span>Number of Seats:</span>
                        <span>${data.seats.length}</span>
                    </div>
                    <div class="summary-item">
                        <span>Price per Seat:</span>
                        <span>₹${data.show.price_per_seat}</span>
                    </div>
                    <div class="summary-item total">
                        <span>Total Amount:</span>
                        <span>₹${totalAmount}</span>
                    </div>
                </div>
            `;
        }

        // Select payment method
        function selectPaymentMethod(method) {
            selectedPaymentMethod = method;
            
            // Update radio button
            document.getElementById(method + 'Payment').checked = true;
            
            // Show payment details
            showPaymentDetails(method);
        }

        // Show payment details based on selected method
        function showPaymentDetails(method) {
            const paymentDetails = document.getElementById('paymentDetails');
            
            switch (method) {
                case 'card':
                    paymentDetails.innerHTML = `
                        <div class="form-row">
                            <div class="form-group">
                                <label for="cardNumber" class="form-label">Card Number</label>
                                <input type="text" id="cardNumber" class="form-control" placeholder="1234 5678 9012 3456" maxlength="19" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="cardName" class="form-label">Cardholder Name</label>
                                <input type="text" id="cardName" class="form-control" placeholder="John Doe" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="expiryDate" class="form-label">Expiry Date</label>
                                <input type="text" id="expiryDate" class="form-control" placeholder="MM/YY" maxlength="5" required>
                            </div>
                            <div class="form-group">
                                <label for="cvv" class="form-label">CVV</label>
                                <input type="text" id="cvv" class="form-control" placeholder="123" maxlength="4" required>
                            </div>
                        </div>
                    `;
                    break;
                    
                case 'upi':
                    paymentDetails.innerHTML = `
                        <div class="form-group">
                            <label for="upiId" class="form-label">UPI ID</label>
                            <input type="text" id="upiId" class="form-control" placeholder="username@upi" required>
                        </div>
                        <div class="form-group">
                            <label for="upiApp" class="form-label">UPI App</label>
                            <select id="upiApp" class="form-control" required>
                                <option value="">Select UPI App</option>
                                <option value="gpay">Google Pay</option>
                                <option value="phonepe">PhonePe</option>
                                <option value="paytm">Paytm</option>
                                <option value="amazonpay">Amazon Pay</option>
                                <option value="bhim">BHIM</option>
                            </select>
                        </div>
                    `;
                    break;
                    
                case 'netbanking':
                    paymentDetails.innerHTML = `
                        <div class="form-group">
                            <label for="bank" class="form-label">Select Bank</label>
                            <select id="bank" class="form-control" required>
                                <option value="">Choose your bank</option>
                                <option value="sbi">State Bank of India</option>
                                <option value="hdfc">HDFC Bank</option>
                                <option value="icici">ICICI Bank</option>
                                <option value="axis">Axis Bank</option>
                                <option value="kotak">Kotak Mahindra Bank</option>
                                <option value="pnb">Punjab National Bank</option>
                                <option value="canara">Canara Bank</option>
                                <option value="union">Union Bank of India</option>
                            </select>
                        </div>
                    `;
                    break;
                    
                case 'wallet':
                    paymentDetails.innerHTML = `
                        <div class="form-group">
                            <label for="walletType" class="form-label">Select Wallet</label>
                            <select id="walletType" class="form-control" required>
                                <option value="">Choose your wallet</option>
                                <option value="paytm">Paytm</option>
                                <option value="phonepe">PhonePe</option>
                                <option value="amazonpay">Amazon Pay</option>
                                <option value="mobikwik">MobiKwik</option>
                                <option value="freecharge">FreeCharge</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="walletNumber" class="form-label">Mobile Number</label>
                            <input type="tel" id="walletNumber" class="form-control" placeholder="Enter mobile number" required>
                        </div>
                    `;
                    break;
            }
        }

        // Format show time
        function formatShowTime(showTime) {
            const date = new Date(showTime);
            return date.toLocaleString('en-IN', {
                weekday: 'short',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Handle payment form submission
        document.getElementById('paymentForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            
            if (!currentUser) {
                showMessage('Please login to continue', 'warning');
                window.location.href = '/login/';
                return;
            }
            
            // Collect payment data
            const paymentData = {
                method: selectedPaymentMethod,
                details: {}
            };
            
            // Collect details based on payment method
            switch (selectedPaymentMethod) {
                case 'card':
                    paymentData.details = {
                        cardNumber: document.getElementById('cardNumber').value,
                        cardName: document.getElementById('cardName').value,
                        expiryDate: document.getElementById('expiryDate').value,
                        cvv: document.getElementById('cvv').value
                    };
                    break;
                case 'upi':
                    paymentData.details = {
                        upiId: document.getElementById('upiId').value,
                        upiApp: document.getElementById('upiApp').value
                    };
                    break;
                case 'netbanking':
                    paymentData.details = {
                        bank: document.getElementById('bank').value
                    };
                    break;
                case 'wallet':
                    paymentData.details = {
                        walletType: document.getElementById('walletType').value,
                        mobileNumber: document.getElementById('walletNumber').value
                    };
                    break;
            }
            
            // Process payment
            const success = await processPayment(paymentData);
            if (success) {
                // Redirect will be handled by processPayment function
            }
        });

        // Card number formatting
        document.addEventListener('input', function(event) {
            if (event.target.id === 'cardNumber') {
                let value = event.target.value.replace(/\s/g, '').replace(/\D/g, '');
                value = value.replace(/(\d{4})/g, '$1 ').trim();
                event.target.value = value;
            }
            
            if (event.target.id === 'expiryDate') {
                let value = event.target.value.replace(/\D/g, '');
                if (value.length >= 2) {
                    value = value.substring(0, 2) + '/' + value.substring(2, 4);
                }
                event.target.value = value;
            }
        });
    </script>
</body>
</html>
