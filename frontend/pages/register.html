<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Rolling Popcorn</title>
    <link rel="stylesheet" href="/frontend/assets/css/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="navbar">
            <a href="/" class="logo">
                <img src="/frontend/assets/images/logos/rollingpopcornlogo.png" alt="Rolling Popcorn">
                <h1>Rolling Popcorn</h1>
            </a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/movies/">Movies</a>
                <a href="/booking/">My Bookings</a>
            </div>
            <div class="user-menu">
                <div class="user-info">
                    <div class="user-name">Guest</div>
                    <div class="user-role">Please Login</div>
                </div>
                <a href="/login/" class="btn btn-sm">Login</a>
                <a href="/register/" class="btn btn-sm">Register</a>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <div class="container">
        <div class="form-container">
            <h2 class="form-title">Create Your Account</h2>
            
            <form id="registerForm" class="auth-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" id="firstName" name="first_name" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" id="lastName" name="last_name" class="form-control" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="form-control" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirm_password" class="form-control" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
                </div>
                
                <div class="form-footer">
                    <p>Already have an account? <a href="/login/">Login here</a></p>
                    <p><a href="/">Back to Home</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer style="background-color: var(--dark-gray); padding: 2rem; text-align: center; margin-top: 3rem;">
        <div class="container">
            <p>&copy; 2024 Rolling Popcorn. All rights reserved.</p>
            <p>Experience the magic of cinema with us.</p>
        </div>
    </footer>

    <script src="/frontend/assets/js/app.js"></script>
    <script>
        // Registration form handling
        document.getElementById('registerForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            
            const formData = new FormData(event.target);
            const userData = {
                first_name: formData.get('first_name'),
                last_name: formData.get('last_name'),
                email: formData.get('email'),
                username: formData.get('username'),
                phone: formData.get('phone'),
                password: formData.get('password'),
                confirm_password: formData.get('confirm_password')
            };
            
            // Validation
            if (!userData.first_name || !userData.last_name || !userData.email || 
                !userData.username || !userData.phone || !userData.password || !userData.confirm_password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            if (userData.password !== userData.confirm_password) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            if (userData.password.length < 8) {
                showMessage('Password must be at least 8 characters long', 'error');
                return;
            }
            
            const success = await register(userData);
            if (success) {
                // Redirect will be handled by the register function
            }
        });

        // Check if user is already logged in
        document.addEventListener('DOMContentLoaded', async function() {
            const isAuthenticated = await checkAuthStatus();
            if (isAuthenticated) {
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
