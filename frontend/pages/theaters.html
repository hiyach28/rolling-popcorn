<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theaters - Rolling Popcorn</title>
    <link rel="stylesheet" href="/frontend/assets/css/styles.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <a href="/" class="logo">
                <h1>Rolling Popcorn</h1>
            </a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/movies/">Movies</a>
                <a href="/theaters/" class="active">Theaters</a>
                <a href="/booking/">My Bookings</a>
            </div>
            <div class="user-menu"></div>
        </nav>
    </header>

    <div class="container">
        <section class="page-header">
            <h1 class="section-title">Theaters</h1>
            <p class="section-subtitle">Find a theater near you</p>
        </section>

        <section class="search-section">
            <form class="search-form" onsubmit="searchTheaters(event)">
                <div class="form-group">
                    <label class="form-label">Search</label>
                    <input type="text" class="form-control" id="theaterSearch" placeholder="Theater name or city...">
                </div>
                <div class="form-group">
                    <label class="form-label">City</label>
                    <select class="form-control" id="cityFilter">
                        <option value="">All Cities</option>
                        <option value="Mumbai">Mumbai</option>
                        <option value="Delhi">Delhi</option>
                        <option value="Bengaluru">Bengaluru</option>
                        <option value="Chennai">Chennai</option>
                        <option value="Hyderabad">Hyderabad</option>
                    </select>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Search</button>
                </div>
            </form>
        </section>

        <section class="theaters-section">
            <div class="theaters-grid" id="theatersGrid">
                <!-- Theaters loaded dynamically -->
            </div>
        </section>
    </div>

    <footer style="background-color: var(--dark-gray); padding: 2rem; text-align: center; margin-top: 3rem;">
        <div class="container">
            <p>&copy; 2024 Rolling Popcorn. All rights reserved.</p>
        </div>
    </footer>

    <script src="/frontend/assets/js/app.js"></script>
    <script>
        async function loadTheaters(filters = {}) {
            showLoading('Loading theaters...');
            try {
                let endpoint = '/theaters/';
                const params = new URLSearchParams();
                if (filters.city) params.append('city', filters.city);
                if (filters.search) params.append('search', filters.search);
                if (params.toString()) endpoint += '?' + params.toString();

                const theaters = await apiCall(endpoint);
                displayTheaters(theaters || []);
            } catch (e) {
                showMessage('Failed to load theaters', 'error');
            } finally {
                hideLoading();
            }
        }

        function displayTheaters(theaters) {
            const grid = document.getElementById('theatersGrid');
            if (!theaters.length) {
                grid.innerHTML = '<p>No theaters found.</p>';
                return;
            }
            grid.innerHTML = theaters.map(t => `
                <div class="theater-card">
                    <div class="theater-icon">🎭</div>
                    <div class="theater-info">
                        <h3>${t.name}</h3>
                        <p class="theater-location">📍 ${t.location}</p>
                        <p class="theater-city">🏙️ ${t.city}</p>
                        <p class="theater-screens">🎬 ${t.total_screens} Screen${t.total_screens > 1 ? 's' : ''}</p>
                    </div>
                    <a href="/?theater_city=${encodeURIComponent(t.city)}" class="btn btn-primary">View Shows</a>
                </div>
            `).join('');
        }

        function searchTheaters(event) {
            event.preventDefault();
            loadTheaters({
                search: document.getElementById('theaterSearch').value,
                city: document.getElementById('cityFilter').value
            });
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuthStatus();
            await loadTheaters();
        });
    </script>

    <style>
        .theaters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
        .theater-card { background: var(--card-bg, #1a1a2e); border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .theater-icon { font-size: 2.5rem; }
        .theater-info h3 { margin: 0 0 0.5rem; font-size: 1.2rem; }
        .theater-info p { margin: 0.25rem 0; color: #aaa; font-size: 0.9rem; }
    </style>
</body>
</html>
