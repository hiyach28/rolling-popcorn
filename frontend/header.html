<header>
  <img id="logo" alt="logo" src="assets/rollingpopcornlogo.png">
  
  <div class="search">
    <span class="search-icon material-symbols-outlined">search</span>
    <input type="search" class="search-bar" placeholder="Search for Movies here...">
  </div>
  
  <nav>
    <ul>
      <li><a id="openModalBtn">Location</a></li>
      <li><a id="signinBtn">Sign In</a></li>
    </ul>
  </nav>
</header>

<!-- Location Modal -->
<div id="locationModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>Select Location</h2>
    <input type="text" id="locationInput" placeholder="Enter city...">
    <button id="saveLocation">Save</button>
  </div>
</div>

<!-- Sign In Modal -->
<div id="signinModal" class="modal">
  <div class="modal-content">
    <span class="closeSignin">&times;</span>
    <h2>Sign In</h2>
    <form id="signinForm">
      <input type="email" placeholder="Email" required>
      <input type="password" placeholder="Password" required>
      <button type="submit">Sign In</button>
    </form>
  </div>
</div>
